<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin | NoTippers</title>
  <style>
    :root{ --bg:#0a0b0f; --panel:#0f1117; --muted:#9aa4b2; --text:#e6e9ee; --brand:#0d6efd; --border:#1b1f2a; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(1.2) blur(6px);
      background:linear-gradient(180deg, rgba(10,11,15,.85), rgba(10,11,15,.55));
      border-bottom:1px solid rgba(255,255,255,.06);
      display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 20px}
    header .logo{font-weight:800}
    header nav{display:flex;gap:12px;flex-wrap:wrap}
    header nav a{color:#fff;text-decoration:none;font-size:14px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.08)}
    header nav a:hover{background:rgba(255,255,255,.16)}
    main{flex:1;max-width:1200px;margin:18px auto;padding:0 20px}
    .controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
    .controls select,.controls input{background:#0f1117;color:#e6e9ee;border:1px solid var(--border);border-radius:8px;padding:8px 10px}
    .controls button{background:var(--brand);color:#fff;border:0;border-radius:8px;padding:10px 12px;font-weight:700;cursor:pointer}
    .controls button.ghost{background:rgba(255,255,255,.08)}
    .controls button:hover{filter:brightness(1.05)}
    .panel{background:#0f1117;border:1px solid var(--border);border-radius:16px;padding:14px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid var(--border);vertical-align:top;font-size:14px}
    th{color:#cfe2ff;text-align:left;font-size:13px}
    .tag{display:inline-block;border:1px solid var(--border);border-radius:999px;padding:2px 8px;font-size:12px;color:#adb5bd;background:rgba(255,255,255,.03)}
    .muted{color:#9aa4b2}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
    .row-actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn-ok{background:#2f9e44}
    .btn-warn{background:#e03131}
    .btn-ghost{background:rgba(255,255,255,.08)}
    .btn-ok,.btn-warn,.btn-ghost{color:#fff;border:0;border-radius:8px;padding:8px 10px;font-weight:800;cursor:pointer}
    .btn-ok:hover,.btn-warn:hover,.btn-ghost:hover{filter:brightness(1.05)}
    footer{color:#9aa4b2;text-align:center;padding:16px;border-top:1px solid rgba(255,255,255,.06)}
    @media (max-width:980px){ .hide-mobile{display:none} }
  </style>
</head>
<body>
  <header>
    <div class="logo">NoTippers — Admin</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="browse.html">Browse</a>
      <a href="report.html">Report</a>
      <a href="login.html" id="loginLink">Log In</a>
      <a href="#" id="logoutLink" style="display:none">Log Out</a>
    </nav>
  </header>

  <main>
    <h1 style="margin:6px 0 10px">Moderation Queue</h1>
    <p class="muted" style="margin-top:-4px;line-height:1.35">
      Approving a report flips <span class="tag">reviewed</span> to <span class="tag">true</span>.
      Hidden reports (<span class="tag">is_hidden</span> = <span class="tag">true</span>) never appear publicly.
      Exact addresses are not stored — only hashes.
    </p>

    <div class="controls">
      <select id="filter">
        <option value="pending">Pending (reviewed=false AND is_hidden=false)</option>
        <option value="reviewed">Reviewed (reviewed=true AND is_hidden=false)</option>
        <option value="hidden">Hidden (is_hidden=true)</option>
        <option value="all">All</option>
      </select>

      <input id="search" type="search" placeholder="Search city/state/zip/type/notes/platforms/hash/area…" style="min-width:320px" />

      <button id="refresh">Refresh</button>
      <button id="export" class="ghost">Export CSV</button>
      <span class="muted" id="count"></span>
    </div>

    <div class="panel">
      <div style="overflow:auto">
        <table id="tbl">
          <thead>
            <tr>
              <th>When</th>
              <th>City/State/ZIP</th>
              <th>Signal</th>
              <th class="hide-mobile">Platforms</th>
              <th class="hide-mobile">Notes</th>
              <th class="hide-mobile">Keys</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="7" class="muted">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <footer>© <span id="y"></span> NoTippers</footer>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    document.getElementById('y').textContent = new Date().getFullYear();

    const SUPABASE_URL = "https://gnkraxolcyrxpojrsolh.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_ZaE1ZrItKj1UG3icsjRNgw_ie-lbZnj";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    (async () => {
      const session = await window.NotippersAuth?.requireAuth(true);
      if (!session) return;
      loadRows();
    })();

    const rowsEl   = document.getElementById('rows');
    const filterEl = document.getElementById('filter');
    const searchEl = document.getElementById('search');
    const refreshBtn = document.getElementById('refresh');
    const exportBtn  = document.getElementById('export');
    const countEl    = document.getElementById('count');

    filterEl.addEventListener('change', loadRows);
    searchEl.addEventListener('input', debounce(loadRows, 250));
    refreshBtn.addEventListener('click', loadRows);
    exportBtn.addEventListener('click', exportCSV);

    function esc(s){
      return (s ?? '').toString().replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }
    function debounce(fn, ms){ let t; return (...a) => { clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }

    function parsePlatforms(val){
      if (val == null) return '';
      if (Array.isArray(val)) return val.join(', ');

      const s = String(val).trim();
      if (!s) return '';

      // try JSON array
      if (s.startsWith('[') && s.endsWith(']')) {
        try {
          const arr = JSON.parse(s);
          if (Array.isArray(arr)) return arr.join(', ');
        } catch {}
      }
      return s;
    }

    function labelType(t){
      return t === 'bait_tipper' ? 'Bait-Tipper' :
             t === 'non_tipper'  ? 'Non-Tipper'  :
             t === 'tips'        ? 'Known for tips' :
             t === 'no_tips'     ? 'Known not to tip' :
             (t || '');
    }

    async function loadRows(){
      rowsEl.innerHTML = '<tr><td colspan="7" class="muted">Loading…</td></tr>';

      const view = filterEl.value;
      const q = (searchEl.value || '').trim().toLowerCase();

      let query = sb
        .from('reports')
        .select('id,created_at,city,state,zip,type,platforms,notes,reviewed,is_hidden,address_hash,area_key')
        .order('created_at', { ascending:false })
        .limit(250);

      if (view === 'pending')  query = query.eq('reviewed', false).eq('is_hidden', false);
      if (view === 'reviewed') query = query.eq('reviewed', true).eq('is_hidden', false);
      if (view === 'hidden')   query = query.eq('is_hidden', true);

      const { data, error } = await query;
      if (error) {
        console.error(error);
        rowsEl.innerHTML = '<tr><td colspan="7" class="muted">Error loading data. Check RLS / permissions.</td></tr>';
        countEl.textContent = '';
        return;
      }

      let items = data || [];
      if (q) {
        items = items.filter(r => {
          const hay = [
            r.city, r.state, r.zip, r.type, r.notes, r.platforms, r.area_key, r.address_hash
          ].filter(Boolean).join(' ').toLowerCase();
          return hay.includes(q);
        });
      }

      countEl.textContent = items.length ? `${items.length} records` : '0 records';

      if (!items.length) {
        rowsEl.innerHTML = '<tr><td colspan="7" class="muted">No records.</td></tr>';
        return;
      }

      rowsEl.innerHTML = items.map(rowHTML).join('');
      items.forEach(r => attachRowHandlers(r.id));
    }

    function rowHTML(r){
      const when = r.created_at ? new Date(r.created_at).toLocaleString() : '';
      const platforms = parsePlatforms(r.platforms);
      const state = (r.state || '').toUpperCase();
      const zip = (r.zip || '').trim();

      const hashShort = (r.address_hash || '').slice(0, 10);
      const areaShort = (r.area_key || '').slice(0, 28) + ((r.area_key || '').length > 28 ? '…' : '');

      const reviewedTag = r.reviewed ? '<span class="tag">reviewed</span>' : '<span class="tag">pending</span>';
      const hiddenTag = r.is_hidden ? '<span class="tag">hidden</span>' : '';

      return `
        <tr id="row-${esc(r.id)}">
          <td>${esc(when)}<div style="margin-top:6px">${reviewedTag} ${hiddenTag}</div></td>
          <td><div><strong>${esc(r.city || '')}</strong>${r.city && state ? ', ' : ''}${esc(state)}${zip ? ' ' + esc(zip) : ''}</div></td>
          <td><span class="tag">${esc(labelType(r.type))}</span></td>
          <td class="hide-mobile">${platforms ? esc(platforms) : '<span class="muted">—</span>'}</td>
          <td class="hide-mobile">${r.notes ? esc(r.notes) : '<span class="muted">—</span>'}</td>
          <td class="hide-mobile">
            <div class="mono muted">hash: ${esc(hashShort)}…</div>
            <div class="mono muted">area: ${esc(areaShort)}</div>
          </td>
          <td>
            <div class="row-actions">
              ${(!r.reviewed && !r.is_hidden)
                ? `<button class="btn-ok" data-act="approve" data-id="${esc(r.id)}">Approve</button>`
                : ''
              }
              ${(!r.is_hidden)
                ? `<button class="btn-warn" data-act="hide" data-id="${esc(r.id)}">Hide</button>`
                : `<button class="btn-ghost" data-act="unhide" data-id="${esc(r.id)}">Unhide</button>`
              }
            </div>
            <div class="muted" style="margin-top:6px;font-size:12px">Actions should be protected by RLS.</div>
          </td>
        </tr>
      `;
    }

    function attachRowHandlers(id){
      const row = document.getElementById(`row-${id}`);
      if (!row) return;

      row.querySelectorAll('button[data-act]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const act = btn.getAttribute('data-act');
          if (act === 'approve') await sb.from('reports').update({ reviewed: true }).eq('id', id);
          if (act === 'hide') {
            if (!confirm('Hide this report from public views?')) return;
            await sb.from('reports').update({ is_hidden: true }).eq('id', id);
          }
          if (act === 'unhide') await sb.from('reports').update({ is_hidden: false }).eq('id', id);

          // reload after action
          loadRows();
        });
      });
    }

    function exportCSV(){
      const items = [...document.querySelectorAll('#rows tr')];
      if (!items.length) return;

      const header = ['When','City','State','ZIP','Type','Platforms','Notes','Reviewed','Hidden','Area Key','Address Hash'];
      const csvRows = [header];

      items.forEach(tr => {
        const tds = tr.querySelectorAll('td');
        if (!tds.length) return;

        const when = (tds[0]?.innerText || '').split('\n')[0].trim();
        const loc  = (tds[1]?.innerText || '').trim();
        const type = (tds[2]?.innerText || '').trim();
        const plats= (tds[3]?.innerText || '').trim();
        const notes= (tds[4]?.innerText || '').trim();
        const keys = (tds[5]?.innerText || '').trim();
        const flags = (tds[0]?.innerText || '').toLowerCase();
        const reviewed = flags.includes('reviewed') ? 'true' : 'false';
        const hidden = flags.includes('hidden') ? 'true' : 'false';

        let city='', state='', zip='';
        const m = loc.match(/^(.+?)(?:,\s*([A-Z]{2}))?(?:\s+(\d{5}(?:-\d{4})?))?$/);
        if (m) { city = (m[1]||'').trim(); state=(m[2]||'').trim(); zip=(m[3]||'').trim(); }

        const areaKey = keys.split('\n').find(x => x.includes('area:'))?.replace('area:','').trim() || '';
        const addrHash = keys.split('\n').find(x => x.includes('hash:'))?.replace('hash:','').trim() || '';

        csvRows.push([when, city, state, zip, type, plats, notes, reviewed, hidden, areaKey, addrHash].map(csvEscape));
      });

      const csv = csvRows.map(r => r.join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `reports-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function csvEscape(v){
      v = (v ?? '').toString().replace(/\n/g,' ').trim();
      if (v.includes(',') || v.includes('"')) return `"${v.replace(/"/g,'""')}"`;
      return v;
    }
  </script>
</body>
</html>
